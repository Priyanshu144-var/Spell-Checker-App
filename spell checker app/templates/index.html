<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Spell Checker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

.container{
    width:800px;
    max-width:95%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:2rem;
}

.subtitle{
    text-align:center;
    margin-bottom:25px;
    opacity:0.8;
}

textarea{
    width:100%;
    height:140px;
    border:none;
    border-radius:15px;
    padding:15px;
    font-size:16px;
    resize:none;
    outline:none;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#ffffff;
    color:#764ba2;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.result{
    margin-top:25px;
    background:rgba(255,255,255,0.12);
    padding:20px;
    border-radius:15px;
}

.result h3{
    margin-bottom:10px;
}

.result p{
    background:white;
    color:black;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    word-wrap:break-word;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

    <h1>✨ AI Spell Checker</h1>

    <p class="subtitle">
        Correct spelling mistakes instantly using Python & Flask
    </p>

    <form action="/check" method="POST">

        <textarea
        name="text"
        placeholder="Type your text here..."></textarea>

        <button type="submit">
            🚀 Check Spelling
        </button>

    </form>

    {% if corrected %}

    <div class="result">

        <h3>📝 Original Text</h3>
        <p>{{ original }}</p>

        <h3>✅ Corrected Text</h3>
        <p>{{ corrected }}</p>

    </div>

    {% endif %}

    <div class="footer">
        Developed using Flask & PySpellChecker
    </div>

</div>

</body>
</html>
